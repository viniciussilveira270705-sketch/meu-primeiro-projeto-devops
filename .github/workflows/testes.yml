name: Executar Testes
on: [pull_request]

jobs:
  job-testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Pytest e Rodar
        run: |
          pip install pytest
          pytest test_calculos.py
